<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踩雷 — 小游戏合集</title>
<style>
  :root {
    --bg-primary:     #1a1a2e;
    --bg-secondary:   #16213e;
    --bg-tertiary:    #0f3460;
    --bg-panel:       rgba(255,255,255,0.05);
    --bg-panel-hover: rgba(255,255,255,0.08);
    --accent:         #ffd54f;
    --accent-dim:     #ffb300;
    --text-primary:   #ffffff;
    --text-secondary: #aaaaaa;
    --text-muted:     #666666;
    --border-subtle:  rgba(255,255,255,0.10);
    --glow-accent:    0 0 20px rgba(255,213,79,0.35);
    --glow-strong:    0 0 40px rgba(255,213,79,0.50);
    --glow-title:     0 0 30px rgba(255,213,79,0.60);
    --font-ui:        'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
    --font-mono:      'Consolas', 'Courier New', monospace;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px; --radius-xl: 22px;
    --transition-fast: 0.15s ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--font-ui);
    color: var(--text-primary);
    user-select: none;
    padding: 20px;
  }

  /* 返回大厅 */
  .back-link {
    position: fixed; top: 16px; left: 16px;
    color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
    padding: 6px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle); background: var(--bg-panel);
    transition: all var(--transition-fast); z-index: 100;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow-accent); }

  /* 标题 */
  h1 {
    font-size: 2.2rem; margin-bottom: 6px;
    text-shadow: var(--glow-title); letter-spacing: 2px; color: var(--accent);
  }
  .subtitle { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.88rem; }

  /* 控制栏 */
  .controls {
    display: flex; gap: 10px; margin-bottom: 16px;
    align-items: center; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    padding: 8px 20px; border: none; border-radius: var(--radius-md); cursor: pointer;
    font-size: 0.9rem; font-weight: 600; font-family: var(--font-ui);
    transition: all var(--transition-fast); min-height: 40px;
  }
  .btn-primary   { background: var(--accent); color: #1a1a2e; }
  .btn-primary:hover  { background: var(--accent-dim); transform: translateY(-1px); box-shadow: var(--glow-accent); }
  .btn-secondary { background: var(--bg-panel); color: var(--text-primary); border: 1px solid var(--border-subtle); }
  .btn-secondary:hover{ border-color: var(--accent); color: var(--accent); background: var(--bg-panel-hover); }
  .btn.active    { background: var(--accent); color: #1a1a2e; border-color: var(--accent); }
  .btn:active    { transform: scale(0.97); }
  .difficulty-btns { display: flex; gap: 8px; }

  /* 信息栏 */
  .info-bar {
    display: flex; gap: 24px; margin-bottom: 14px; font-size: 1rem;
    background: var(--bg-panel); padding: 10px 28px;
    border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);
    flex-wrap: wrap; justify-content: center;
  }
  .info-item { display: flex; align-items: center; gap: 6px; }
  .info-value { font-weight: 700; font-family: var(--font-mono); color: var(--accent); min-width: 2.5ch; }

  /* 棋盘 */
  #board {
    display: inline-grid; gap: 3px; padding: 14px;
    background: var(--bg-panel); border-radius: var(--radius-xl);
    border: 1px solid var(--border-subtle);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .cell {
    width: 36px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: bold;
    cursor: pointer; transition: all 0.15s;
    border: none; outline: none; font-family: var(--font-ui);
  }
  .cell.hidden {
    background: linear-gradient(145deg,#2a4a7f,#1a3a6f);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3),-1px -1px 2px rgba(255,255,255,0.05);
  }
  .cell.hidden:hover { background: linear-gradient(145deg,#3a5a9f,#2a4a8f); transform: scale(1.05); }
  .cell.revealed {
    background: rgba(255,255,255,0.07); cursor: default;
    box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3);
  }
  .cell.flagged {
    background: linear-gradient(145deg,#2a4a7f,#1a3a6f);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .cell.mine-hit  { background: #e94560 !important; animation: shake 0.3s; }
  .cell.mine-show { background: rgba(233,69,96,0.18); }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes reveal { from{transform:scale(0.85);opacity:0.5} to{transform:scale(1);opacity:1} }
  .cell.revealed { animation: reveal 0.15s ease-out; }

  .n1{color:#64b5f6} .n2{color:#81c784} .n3{color:#e57373}
  .n4{color:#7986cb} .n5{color:#ff8a65} .n6{color:#4dd0e1}
  .n7{color:#f06292} .n8{color:#aaa}

  /* 消息 */
  #message {
    margin-top: 18px; font-size: 1.4rem; font-weight: bold;
    min-height: 2rem; text-align: center; text-shadow: 0 0 10px currentColor;
  }
  .win  { color: #81c784; }
  .lose { color: #e94560; }

  /* 最快时间 */
  .best-times {
    margin-top: 14px; display: flex; gap: 16px;
    background: var(--bg-panel); padding: 10px 20px;
    border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);
    font-size: 0.8rem; flex-wrap: wrap; justify-content: center;
  }
  .best-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .best-label { color: var(--text-muted); font-size: 0.7rem; }
  .best-val   { color: var(--accent); font-family: var(--font-mono); font-weight: 700; }

  /* 帮助 */
  .help-section {
    margin-top: 14px; color: var(--text-muted); font-size: 0.78rem; text-align: center; max-width: 420px;
  }
  .help-section summary { cursor: pointer; color: var(--text-secondary); margin-bottom: 6px; }
  .help-section div { line-height: 2.0; }

  /* 破纪录横幅 */
  .record-banner {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--accent); color: #1a1a2e;
    padding: 10px 24px; border-radius: 25px;
    font-weight: 700; font-size: 1.1rem;
    box-shadow: var(--glow-strong);
    transition: all 0.4s ease; z-index: 999;
    opacity: 0; pointer-events: none;
  }
  .record-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<a class="back-link" href="../index.html">← 游戏大厅</a>

<h1>💣 踩雷</h1>
<p class="subtitle">左键翻开 · 右键插旗</p>

<div class="controls">
  <div class="difficulty-btns">
    <button class="btn btn-secondary active" id="easy"   onclick="setDifficulty('easy')">🌱 简单</button>
    <button class="btn btn-secondary"        id="medium" onclick="setDifficulty('medium')">🔥 中等</button>
    <button class="btn btn-secondary"        id="hard"   onclick="setDifficulty('hard')">💀 困难</button>
  </div>
  <button class="btn btn-primary"   onclick="newGame()">🔄 新游戏</button>
  <button class="btn btn-secondary" id="muteBtn">🔊</button>
</div>

<div class="info-bar">
  <div class="info-item">💣 地雷 <span class="info-value" id="mineCount">10</span></div>
  <div class="info-item">🚩 旗帜 <span class="info-value" id="flagCount">0</span></div>
  <div class="info-item">⏱ 时间 <span class="info-value" id="timer">0</span>s</div>
  <div class="info-item">🎮 局数 <span class="info-value" id="playCount">0</span></div>
</div>

<div id="board"></div>
<div id="message" aria-live="polite"></div>

<div class="best-times">
  <div class="best-item"><span class="best-label">🌱 简单最快</span><span class="best-val" id="bestEasy">—</span></div>
  <div class="best-item"><span class="best-label">🔥 中等最快</span><span class="best-val" id="bestMedium">—</span></div>
  <div class="best-item"><span class="best-label">💀 困难最快</span><span class="best-val" id="bestHard">—</span></div>
</div>

<details class="help-section">
  <summary>📖 操作说明</summary>
  <div>
    左键点击 — 翻开格子<br>
    右键点击 — 插旗 / 取消插旗<br>
    双击已翻开数字 — 快速展开（旗帜数量匹配时）<br>
    第一格保证安全，点击后计时开始
  </div>
</details>

<script>
// ============================================================
// 存储
// ============================================================
const GAME_KEY = '小游戏_踩雷';
const Store = {
  get(f,d=0)         { const v=localStorage.getItem(`${GAME_KEY}_${f}`); return v!==null?JSON.parse(v):d; },
  set(f,v)           { localStorage.setItem(`${GAME_KEY}_${f}`,JSON.stringify(v)); },
  tryBestTime(diff,s){ // 越小越好
    const k=`最快时间_${diff}`;
    const cur=this.get(k,Infinity);
    if(s<cur){ this.set(k,s); return true; }
    return false;
  },
};

// ============================================================
// 音效
// ============================================================
const SFX = (() => {
  let actx=null;
  let muted=JSON.parse(localStorage.getItem('小游戏_全局_静音')||'false');
  function gc() {
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    return actx;
  }
  function beep(freq,dur,type='square',vol=0.18) {
    if(muted) return;
    try{
      const c=gc(),osc=c.createOscillator(),g=c.createGain();
      osc.connect(g);g.connect(c.destination);
      osc.type=type;osc.frequency.setValueAtTime(freq,c.currentTime);
      g.gain.setValueAtTime(vol,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
      osc.start(c.currentTime);osc.stop(c.currentTime+dur);
    }catch(e){}
  }
  return {
    isMuted(){ return muted; },
    toggle() {
      muted=!muted;
      localStorage.setItem('小游戏_全局_静音',JSON.stringify(muted));
      return muted;
    },
    flag()    { beep(660,0.06,'square',0.15); },
    unflag()  { beep(440,0.06,'square',0.12); },
    reveal()  { beep(550,0.04,'sine',0.12); },
    gameOver(){ beep(120,0.7,'sawtooth',0.3); },
    win()     { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'sine',0.22),i*100)); },
    record()  { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'sine',0.22),i*80)); },
  };
})();

// ============================================================
// 难度配置
// ============================================================
const DIFFICULTIES = {
  easy:   { rows:9,  cols:9,  mines:10,  key:'简单' },
  medium: { rows:16, cols:16, mines:40,  key:'中等' },
  hard:   { rows:16, cols:30, mines:99,  key:'困难' },
};
let curDiff = 'easy';
let config  = DIFFICULTIES.easy;

// ============================================================
// 游戏状态
// ============================================================
let board2=[], revealed=[], flagged=[], minePos=new Set();
let gameOver=false, gameWon=false, firstClick=true;
let timerInt=null, seconds=0, flagCount=0;
let playCount = Store.get('总局数',0);

// ============================================================
// 初始化显示
// ============================================================
document.getElementById('muteBtn').textContent = SFX.isMuted()?'🔇':'🔊';
document.getElementById('playCount').textContent = playCount;
updateBestTimes();

function updateBestTimes() {
  ['easy','medium','hard'].forEach(d=>{
    const k=DIFFICULTIES[d].key;
    const ids={easy:'bestEasy',medium:'bestMedium',hard:'bestHard'};
    const v=Store.get(`最快时间_${k}`,Infinity);
    document.getElementById(ids[d]).textContent = v===Infinity ? '—' : `${v}s`;
  });
}

// ============================================================
// 难度切换
// ============================================================
function setDifficulty(d) {
  curDiff=d; config=DIFFICULTIES[d];
  document.querySelectorAll('.difficulty-btns .btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(d).classList.add('active');
  newGame();
}

// ============================================================
// 新游戏
// ============================================================
function newGame() {
  clearInterval(timerInt);
  seconds=0; flagCount=0;
  gameOver=false; gameWon=false; firstClick=true;
  minePos.clear();
  document.getElementById('timer').textContent='0';
  document.getElementById('flagCount').textContent='0';
  document.getElementById('mineCount').textContent=config.mines;
  document.getElementById('message').textContent='';
  document.getElementById('message').className='';

  const {rows,cols}=config;
  board2   = Array.from({length:rows},()=>Array(cols).fill(0));
  revealed = Array.from({length:rows},()=>Array(cols).fill(false));
  flagged  = Array.from({length:rows},()=>Array(cols).fill(false));
  renderBoard();
}

// ============================================================
// 地雷布置
// ============================================================
function placeMines(safeR,safeC) {
  const {rows,cols,mines}=config;
  const safe=new Set();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const nr=safeR+dr,nc=safeC+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols) safe.add(nr*cols+nc);
  }
  while(minePos.size<mines){
    const idx=Math.floor(Math.random()*rows*cols);
    if(!safe.has(idx)) minePos.add(idx);
  }
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    board2[r][c]=minePos.has(r*cols+c)?-1:0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(board2[r][c]===-1) continue;
    let cnt=0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board2[nr][nc]===-1) cnt++;
    }
    board2[r][c]=cnt;
  }
}

// ============================================================
// 棋盘渲染
// ============================================================
function renderBoard() {
  const {rows,cols}=config;
  const el=document.getElementById('board');
  el.style.gridTemplateColumns=`repeat(${cols},36px)`;
  el.innerHTML='';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    cell.className='cell hidden';
    cell.dataset.r=r; cell.dataset.c=c;
    cell.addEventListener('click',onLeftClick);
    cell.addEventListener('contextmenu',onRightClick);
    cell.addEventListener('dblclick',onDblClick);
    el.appendChild(cell);
  }
}

function getCellEl(r,c) { return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`); }

// ============================================================
// 交互事件
// ============================================================
function onLeftClick() {
  if(gameOver||gameWon) return;
  const r=+this.dataset.r, c=+this.dataset.c;
  if(flagged[r][c]||revealed[r][c]) return;
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    startTimer();
  }
  if(board2[r][c]===-1){ revealMines(r,c); return; }
  floodReveal(r,c);
  SFX.reveal();
  checkWin();
}

function onRightClick(e) {
  e.preventDefault();
  if(gameOver||gameWon) return;
  const r=+this.dataset.r, c=+this.dataset.c;
  if(revealed[r][c]) return;
  flagged[r][c]=!flagged[r][c];
  flagCount+=flagged[r][c]?1:-1;
  document.getElementById('flagCount').textContent=flagCount;
  updateCell(r,c);
  flagged[r][c]?SFX.flag():SFX.unflag();
}

function onDblClick() {
  if(gameOver||gameWon) return;
  const r=+this.dataset.r, c=+this.dataset.c;
  if(!revealed[r][c]||board2[r][c]<=0) return;
  let flags=0;
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<config.rows&&nc>=0&&nc<config.cols&&flagged[nr][nc]) flags++;
  }
  if(flags===board2[r][c]){
    let hitMine=false;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<config.rows&&nc>=0&&nc<config.cols&&!flagged[nr][nc]&&!revealed[nr][nc]){
        if(board2[nr][nc]===-1) hitMine=true;
        else floodReveal(nr,nc);
      }
    }
    if(hitMine){
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<config.rows&&nc>=0&&nc<config.cols&&board2[nr][nc]===-1&&!flagged[nr][nc])
          revealMines(nr,nc);
      }
    } else { SFX.reveal(); checkWin(); }
  }
}

// ============================================================
// 游戏逻辑
// ============================================================
function floodReveal(r,c) {
  const{rows,cols}=config;
  if(r<0||r>=rows||c<0||c>=cols) return;
  if(revealed[r][c]||flagged[r][c]) return;
  revealed[r][c]=true; updateCell(r,c);
  if(board2[r][c]===0)
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++)
      if(dr!==0||dc!==0) floodReveal(r+dr,c+dc);
}

function revealMines(hitR,hitC) {
  gameOver=true;
  clearInterval(timerInt);

  // 记录局数
  playCount++;
  Store.set('总局数',playCount);
  document.getElementById('playCount').textContent=playCount;

  const{rows,cols}=config;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    if(board2[r][c]===-1){ revealed[r][c]=true; updateCell(r,c,r===hitR&&c===hitC); }
  const msg=document.getElementById('message');
  msg.textContent='💥 踩到地雷了！游戏结束';
  msg.className='lose';
  SFX.gameOver();
}

function checkWin() {
  const{rows,cols,mines}=config;
  let unrevealed=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(!revealed[r][c]) unrevealed++;
  if(unrevealed===mines){
    gameWon=true;
    clearInterval(timerInt);

    // 记录局数
    playCount++;
    Store.set('总局数',playCount);
    document.getElementById('playCount').textContent=playCount;

    // 最快时间
    if(Store.tryBestTime(config.key,seconds)){
      updateBestTimes();
      showRecordBanner(`${config.key}最快纪录`);
      SFX.record();
    } else {
      SFX.win();
    }

    const msg=document.getElementById('message');
    msg.textContent=`🎉 恭喜通关！用时 ${seconds} 秒`;
    msg.className='win';
  }
}

function updateCell(r,c,isHit=false) {
  const el=getCellEl(r,c);
  if(!el) return;
  el.className='cell'; el.textContent='';
  if(!revealed[r][c]){
    el.classList.add(flagged[r][c]?'flagged':'hidden');
    el.textContent=flagged[r][c]?'🚩':'';
    return;
  }
  if(board2[r][c]===-1){
    el.classList.add(isHit?'mine-hit':'mine-show');
    el.textContent='💣'; return;
  }
  el.classList.add('revealed');
  if(board2[r][c]>0){ el.textContent=board2[r][c]; el.classList.add(`n${board2[r][c]}`); }
}

function startTimer() {
  timerInt=setInterval(()=>{
    seconds++;
    document.getElementById('timer').textContent=seconds;
  },1000);
}

function showRecordBanner(label='新纪录') {
  const el=document.createElement('div');
  el.className='record-banner'; el.textContent=`🏆 ${label}！`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},2500);
}

// ============================================================
// 键盘
// ============================================================
document.addEventListener('keydown',e=>{
  switch(e.code){
    case'Enter':  newGame(); break;
    case'KeyR':   newGame(); break;
    case'KeyM':
      SFX.toggle();
      document.getElementById('muteBtn').textContent=SFX.isMuted()?'🔇':'🔊';
      break;
  }
});

// 静音按钮
document.getElementById('muteBtn').addEventListener('click',()=>{
  SFX.toggle();
  document.getElementById('muteBtn').textContent=SFX.isMuted()?'🔇':'🔊';
});

// ============================================================
// 初始化
// ============================================================
newGame();
</script>
</body>
</html>
