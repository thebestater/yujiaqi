<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>换装小屋</title>
<style>
:root {
  --bg-deep:     #0a0a15;
  --bg-primary:  #1a1a2e;
  --bg-card:     rgba(255,255,255,0.06);
  --accent:      #ff85c2;
  --accent-dim:  #e0609e;
  --accent-soft: rgba(255,133,194,0.18);
  --glow:        0 0 22px rgba(255,133,194,0.45);
  --glow-strong: 0 0 42px rgba(255,133,194,0.65);
  --text:        #fff0f8;
  --text-dim:    rgba(255,240,248,0.6);
  --radius:      18px;
  --radius-sm:   10px;
  --trans:       0.22s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; overflow-y: auto; }
body {
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  color: var(--text); user-select: none;
}
.back-link {
  position: fixed; top: 14px; left: 16px; z-index: 999;
  color: var(--text-dim); text-decoration: none;
  font-size: 13px; padding: 6px 12px;
  background: rgba(255,255,255,0.08); border-radius: 20px; transition: var(--trans);
}
.back-link:hover { color: var(--accent); background: var(--accent-soft); }
.mute-btn {
  position: fixed; top: 10px; right: 16px; z-index: 999;
  background: rgba(255,255,255,0.08); border: none; border-radius: 50%;
  width: 40px; height: 40px; font-size: 18px; cursor: pointer;
  transition: var(--trans); color: var(--text);
}
.mute-btn:hover { background: var(--accent-soft); }
.screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
.screen.active { display: flex; }
.btn { padding: 12px 28px; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--trans); font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dim)); color: #fff; box-shadow: var(--glow); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: var(--glow-strong); }
.btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid rgba(255,255,255,0.18); }
.btn-secondary:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
.btn-accent { background: rgba(255,133,194,0.22); color: var(--accent); border: 1px solid rgba(255,133,194,0.4); font-size: 13px; padding: 9px 16px; }
.btn-accent:hover { background: rgba(255,133,194,0.35); transform: translateY(-1px); }

/* ===== 标题屏 ===== */
#s-title .title-wrap { text-align: center; padding: 20px; }
.game-title {
  font-size: clamp(42px, 8vw, 72px);
  background: linear-gradient(135deg, #fff 20%, var(--accent) 60%, #ffb3d9 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(255,133,194,0.5)); margin-bottom: 10px;
}
.game-subtitle { color: var(--text-dim); font-size: 16px; margin-bottom: 30px; }
.sparkle-row { font-size: 36px; letter-spacing: 12px; margin-bottom: 20px; animation: sparkle-pulse 2s ease-in-out infinite; }
@keyframes sparkle-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.12)} }
.char-preview-row {
  display: flex; gap: 12px; justify-content: flex-start; margin-top: 24px;
  overflow-x: auto; max-width: calc(100vw - 40px);
  padding: 4px 8px 12px; scrollbar-width: thin; scrollbar-color: rgba(255,133,194,0.3) transparent;
}
.char-preview-row::-webkit-scrollbar { height: 4px; }
.char-preview-row::-webkit-scrollbar-thumb { background: rgba(255,133,194,0.3); border-radius: 4px; }
.char-preview-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 12px; background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid rgba(255,133,194,0.2); cursor: pointer; transition: var(--trans); flex-shrink: 0;
}
.char-preview-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--glow); }
.char-preview-name { font-size: 12px; color: var(--text-dim); }

/* ===== 角色选择屏 ===== */
#s-chars { gap: 0; padding: 60px 16px 20px; overflow-y: auto; align-items: center; justify-content: flex-start; }
.screen-title { font-size: 26px; color: var(--text); text-shadow: 0 0 20px rgba(255,133,194,0.4); margin-bottom: 16px; flex-shrink: 0; }
.char-card-row {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 14px; width: 100%; max-width: 980px;
}
.char-card {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 18px 14px 14px; background: var(--bg-card);
  border-radius: var(--radius); border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: var(--trans); width: auto;
}
.char-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--glow); }
.char-card.selected { border-color: var(--accent); box-shadow: var(--glow-strong); }
.char-card-name { font-size: 17px; font-weight: 700; color: var(--text); }
.char-card-desc { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.5; }
.char-card-tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); }

/* 新：卡片升级样式 */
.char-name-row { display: flex; align-items: center; gap: 5px; }
.char-name-edit-btn {
  background: none; border: none; cursor: pointer; font-size: 12px;
  color: var(--text-dim); padding: 1px 3px; border-radius: 5px; transition: var(--trans);
}
.char-name-edit-btn:hover { color: var(--accent); background: var(--accent-soft); }
.char-name-input {
  background: rgba(255,255,255,0.12); border: 1.5px solid var(--accent);
  color: var(--text); font-size: 15px; font-weight: 700;
  border-radius: 8px; padding: 3px 7px; width: 80px;
  font-family: inherit; text-align: center;
}
.char-name-input:focus { outline: none; }
.char-name-confirm, .char-name-cancel {
  background: none; border: none; cursor: pointer; font-size: 14px; padding: 1px 2px; color: var(--text-dim);
}
.char-name-confirm:hover { color: #6cff8e; }
.char-name-cancel:hover { color: #ff6c6c; }
.char-tags { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin: 1px 0; }
.char-tag-pill {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(255,133,194,0.25);
}
.gender-badge-m { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: rgba(79,195,247,0.15); color: #4fc3f7; border: 1px solid rgba(79,195,247,0.3); }
.char-card-story { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.5; max-height: 50px; overflow: hidden; }
.char-card-bday { font-size: 10px; color: rgba(255,240,248,0.45); display: flex; align-items: center; gap: 4px; }

/* ===== 换装室 ===== */
#s-dress { padding: 0; }
.dressing-layout { display: flex; width: 100%; height: 100%; max-width: 900px; padding: 60px 16px 16px; gap: 16px; align-items: stretch; }
.outfit-panel { width: 300px; min-width: 240px; display: flex; flex-direction: column; gap: 10px; }
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-tab {
  padding: 7px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
  font-size: 12px; cursor: pointer; transition: var(--trans);
  background: rgba(255,255,255,0.06); color: var(--text-dim); white-space: nowrap;
}
.cat-tab:hover { border-color: rgba(255,133,194,0.4); color: var(--text); }
.cat-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.item-grid {
  flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; padding-right: 4px; align-content: start;
}
.item-grid::-webkit-scrollbar { width: 4px; }
.item-grid::-webkit-scrollbar-thumb { background: rgba(255,133,194,0.3); border-radius: 4px; }
.item-card {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 8px 4px; border-radius: var(--radius-sm); border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: var(--trans); background: rgba(255,255,255,0.04);
}
.item-card:hover { border-color: rgba(255,133,194,0.4); transform: translateY(-2px); }
.item-card.selected { border-color: var(--accent); background: var(--accent-soft); }
.item-color { width: 52px; height: 52px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.item-name { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.3; }
.item-card.selected .item-name { color: var(--accent); }
.char-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 8px; }
.char-stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
.char-stage svg { filter: drop-shadow(0 8px 24px rgba(255,133,194,0.25)); }
.outfit-summary { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-height: 48px; overflow: hidden; }
.outfit-tag { font-size: 11px; padding: 3px 9px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(255,133,194,0.3); }
.dressing-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

/* 表情切换 */
.expr-row { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 2px 0; }
.expr-btn {
  background: rgba(255,255,255,0.08); border: 2px solid transparent; border-radius: 50%;
  width: 34px; height: 34px; font-size: 16px; cursor: pointer; transition: var(--trans);
}
.expr-btn:hover { background: var(--accent-soft); border-color: rgba(255,133,194,0.4); }
.expr-btn.active { border-color: var(--accent); background: var(--accent-soft); }

/* 收藏造型 */
.btn-fav {
  background: rgba(255,133,194,0.12); border: 1px solid rgba(255,133,194,0.35);
  color: var(--accent); font-size: 12px; padding: 7px 12px; border-radius: 20px;
  cursor: pointer; transition: var(--trans); font-family: inherit; font-weight: 600;
}
.btn-fav:hover { background: rgba(255,133,194,0.25); }
.btn-fav:disabled { opacity: 0.4; cursor: default; transform: none !important; }

/* ===== 场景选择屏 ===== */
#s-scenes { gap: 20px; padding: 60px 20px 20px; }
.scene-card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 780px; width: 100%; }
.scene-card { border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: var(--trans); border: 2px solid rgba(255,255,255,0.1); aspect-ratio: 3/2; }
.scene-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); border-color: var(--accent); }
.scene-card-bg { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 10px; gap: 4px; position: relative; overflow: hidden; }
.scene-card-emoji { font-size: 28px; line-height: 1; }
.scene-card-name { font-size: 12px; font-weight: 600; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
.scene-nav { display: flex; gap: 12px; }

/* ===== 场景互动屏 ===== */
#s-play { padding: 0; justify-content: flex-end; }
.scene-stage { position: absolute; inset: 0; overflow: hidden; }
.scene-deco { position: absolute; inset: 0; pointer-events: none; }
.scene-deco .clickable { pointer-events: all; cursor: pointer; }
#scene-char {
  position: absolute; left: 50%; bottom: 13%;
  transform: translateX(-50%); transform-origin: bottom center;
  cursor: pointer; transition: filter 0.2s; z-index: 10;
}
#scene-char:hover { filter: brightness(1.08) drop-shadow(0 0 14px rgba(255,133,194,0.6)); }
.scene-controls {
  position: relative; z-index: 20; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  padding: 12px 16px 16px;
  background: linear-gradient(0deg, rgba(10,10,21,0.92) 0%, rgba(10,10,21,0.6) 70%, transparent 100%);
  width: 100%;
}
@keyframes anim-wave { 0%,100%{transform:translateX(-50%) rotate(0deg)} 20%{transform:translateX(-50%) rotate(-9deg) translateY(-5px)} 40%{transform:translateX(-50%) rotate(9deg)} 60%{transform:translateX(-50%) rotate(-6deg) translateY(-3px)} 80%{transform:translateX(-50%) rotate(5deg)} }
@keyframes anim-jump { 0%,100%{transform:translateX(-50%) translateY(0) scaleY(1)} 10%{transform:translateX(-50%) translateY(0) scaleY(0.88)} 35%{transform:translateX(-50%) translateY(-70px) scaleY(1.06)} 60%{transform:translateX(-50%) translateY(-35px) scaleY(1)} 80%{transform:translateX(-50%) translateY(-8px) scaleY(1)} 92%{transform:translateX(-50%) translateY(0) scaleY(0.94)} }
@keyframes anim-spin { 0%{transform:translateX(-50%) rotate(0deg) scaleX(1)} 25%{transform:translateX(-50%) rotate(90deg) scaleX(0.65)} 50%{transform:translateX(-50%) rotate(180deg) scaleX(1)} 75%{transform:translateX(-50%) rotate(270deg) scaleX(0.65)} 100%{transform:translateX(-50%) rotate(360deg) scaleX(1)} }
#scene-char.anim-wave { animation: anim-wave 1.0s ease-in-out; }
#scene-char.anim-jump { animation: anim-jump 0.85s ease-in-out; }
#scene-char.anim-spin { animation: anim-spin 0.95s ease-in-out; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes sway  { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
@keyframes bubble-rise { 0%{transform:translateY(0);opacity:0.8} 100%{transform:translateY(-120px);opacity:0} }
@keyframes twinkle { 0%,100%{opacity:0.5;transform:scale(0.9)} 50%{opacity:1;transform:scale(1.1)} }
@keyframes swim { 0%,100%{transform:translateX(0) scaleX(1)} 50%{transform:translateX(18px) scaleX(-1)} }
@keyframes screen-in { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
.screen.active { animation: screen-in 0.3s ease; }

/* ===== 响应式 ===== */
@media (max-width: 680px) {
  .dressing-layout { flex-direction: column; padding-top: 54px; }
  .outfit-panel { width: 100%; min-width: unset; max-height: 52vh; }
  .char-display { min-height: 200px; }
  .item-grid { grid-template-columns: repeat(4, 1fr); }
  .scene-card-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .game-title { font-size: clamp(28px, 7vw, 42px); }
  .game-subtitle { font-size: 13px; }
  .sparkle-row { font-size: 26px; letter-spacing: 8px; }
  .char-card-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .char-card { padding: 12px 10px 10px; }
  .char-card-name { font-size: 14px; }
  .screen-title { font-size: 20px; }
  #s-scenes { padding: 50px 12px 12px; }
  .item-grid { grid-template-columns: repeat(3, 1fr); }
  .item-color { width: 42px; height: 42px; font-size: 22px; }
  .dressing-layout { padding: 48px 8px 8px; gap: 8px; }
  .outfit-panel { max-height: 48vh; }
  .char-display { min-height: 180px; }
  .back-link { font-size: 11px; padding: 4px 10px; }
  .mute-btn { width: 34px; height: 34px; font-size: 15px; }
}
</style>
</head>
<body>

<a class="back-link" href="../index.html">← 游戏大厅</a>
<button class="mute-btn" id="btnMute">🔊</button>

<!-- ███ 屏幕1：标题 ███ -->
<div id="s-title" class="screen active">
  <div class="title-wrap">
    <div class="sparkle-row">✨ 💖 ✨</div>
    <h1 class="game-title">换装小屋</h1>
    <p class="game-subtitle">为你的小伙伴搭配最美造型，探索梦幻场景</p>
    <button class="btn btn-primary" style="font-size:17px;padding:14px 40px;margin-bottom:24px" onclick="goTo('chars')">开始游戏 ✨</button>
    <div class="char-preview-row" id="titlePreviews"></div>
  </div>
</div>

<!-- ███ 屏幕2：角色选择 ███ -->
<div id="s-chars" class="screen">
  <div class="screen-title">✨ 选择你的角色</div>
  <div class="char-card-row" id="charCardRow"></div>
  <button class="btn btn-secondary" style="margin-top:16px;flex-shrink:0" onclick="goTo('title')">← 返回</button>
</div>

<!-- ███ 屏幕3：换装室 ███ -->
<div id="s-dress" class="screen">
  <div class="dressing-layout">
    <div class="outfit-panel">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="item-grid" id="itemGrid"></div>
    </div>
    <div class="char-display">
      <div class="char-stage" id="dressingStage"></div>
      <div class="expr-row" id="exprRow"></div>
      <div class="outfit-summary" id="outfitSummary"></div>
      <div class="dressing-actions">
        <button class="btn btn-primary" onclick="goTo('scenes')">选场景 ✨</button>
        <button class="btn-fav" id="btnSaveFav" onclick="saveFavOutfit()">❤️ 收藏</button>
        <button class="btn-fav" id="btnLoadFav" onclick="loadFavOutfit()" disabled>💖 恢复</button>
        <button class="btn btn-secondary" onclick="clearOutfit()">🔄 重置</button>
        <button class="btn btn-secondary" onclick="goTo('chars')">← 换角色</button>
      </div>
    </div>
  </div>
</div>

<!-- ███ 屏幕4：场景选择 ███ -->
<div id="s-scenes" class="screen">
  <div class="screen-title">🌈 选择场景</div>
  <div class="scene-card-grid" id="sceneCardGrid"></div>
  <div class="scene-nav" style="margin-top:14px">
    <button class="btn btn-secondary" onclick="goTo('dress')">← 返回换装</button>
  </div>
</div>

<!-- ███ 屏幕5：场景互动 ███ -->
<div id="s-play" class="screen">
  <div class="scene-stage" id="sceneStage">
    <div class="scene-deco" id="sceneDeco"></div>
    <div id="scene-char" onclick="onCharClick()"></div>
  </div>
  <div class="scene-controls">
    <button class="btn btn-accent" onclick="triggerAnim('wave')">👋 挥手</button>
    <button class="btn btn-accent" onclick="triggerAnim('jump')">⬆ 跳跃</button>
    <button class="btn btn-accent" onclick="triggerAnim('spin')">💫 转圈</button>
    <button class="btn btn-secondary" onclick="goTo('scenes')">🌄 换场景</button>
    <button class="btn btn-secondary" onclick="goTo('dress')">👗 换装</button>
  </div>
</div>

const state = {
  screen: 'title',
  charId: 0,
  outfit: { dress:-1, top:-1, bottom:-1, hat:-1, hairAcc:-1, bag:-1, shoes:-1 },

// ================================================================

const GAME_KEY = '小游戏_换装';
const Store = {
  get(f, d=0)  { const v=localStorage.getItem(`${GAME_KEY}_${f}`); if(v===null)return d; try{return JSON.parse(v);}catch{return d;} },
  set(f, v)    { localStorage.setItem(`${GAME_KEY}_${f}`, JSON.stringify(v)); },
};

function saveOutfit() {
  Store.set('上次造型', { charId:state.charId, outfit:{...state.outfit}, sceneId:state.sceneId, expression:state.expression });
}
function loadOutfit() {
  const saved = Store.get('上次造型', null);
  if (!saved) return;
  if (saved.charId !== undefined && saved.charId >= 0 && saved.charId < CHARS.length) state.charId = saved.charId;
  state.sceneId = saved.sceneId || 0;
  state.expression = saved.expression || 0;
  if (saved.outfit) Object.assign(state.outfit, saved.outfit);
}

let editingNameId = -1;

function getCharName(id) {
  const custom = Store.get(`角色名_${id}`, '');
  return custom || CHARS[id].defaultName;
}
function setCharName(id, name) {
  const n = name.trim().slice(0, 8);

}

// ================================================================
// 音效
// ================================================================
const SFX = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function isMuted() { try{ return JSON.parse(localStorage.getItem('小游戏_全局_静音')||'false'); }catch{ return false; } }
  function tone(freq, dur, type='sine', vol=0.18, delay=0) {
    if (isMuted()) return;
    try {
      const c=getCtx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
      g.gain.setValueAtTime(vol, c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
      o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur);
    } catch(e){}
  }
  function slide(f1, f2, dur, type='sine', vol=0.2) {
    if (isMuted()) return;
    try {
      const c=getCtx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.setValueAtTime(f1, c.currentTime);
      o.frequency.linearRampToValueAtTime(f2, c.currentTime+dur);
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
      o.start(c.currentTime); o.stop(c.currentTime+dur);
    } catch(e){}
  }
  return {
    dressOn()   { slide(400, 1200, 0.25, 'sine', 0.18); },
    dressOff()  { slide(900, 300, 0.2, 'sine', 0.15); },
    accessory() { tone(880,0.08,'sine',0.15); setTimeout(()=>tone(1320,0.07,'sine',0.12),80); },
    charSelect(){ [523,659,784].forEach((f,i)=>tone(f,0.12,'sine',0.18,i*0.08)); },
    sceneEnter(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.12,'sine',0.18,i*0.08)); },
    sparkle()   { [1200,1400,1600,1800,1600].forEach((f,i)=>tone(f,0.06,'sine',0.13,i*0.05)); },
    bounce()    { tone(880,0.09,'sine',0.16); tone(1100,0.07,'sine',0.12,0.1); },
  };
})();

      <circle cx="68.5" cy="50" r="2.5" fill="white"/>
      <path d="M85,52 Q95,46 105,52" stroke="${ec}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="54" cy="65" rx="8" ry="4" fill="rgba(255,150,150,0.38)"/>
      <ellipse cx="106" cy="65" rx="8" ry="4" fill="rgba(255,150,150,0.38)"/>
      <path d="M66,72 Q80,84 94,72" stroke="#cc3366" fill="none" stroke-width="2.5" stroke-linecap="round"/>
      <text x="104" y="61" font-size="11" fill="#ffd700" opacity="0.9">✦</text>`;
  } else if (expression === 2) {
    return `
      <ellipse cx="65" cy="51" rx="11" ry="14" fill="white"/>
      <ellipse cx="65" cy="52" rx="8" ry="10" fill="${ec}"/>
      <circle cx="68" cy="48" r="3" fill="white"/>
      <ellipse cx="95" cy="51" rx="11" ry="14" fill="white"/>
      <ellipse cx="95" cy="52" rx="8" ry="10" fill="${ec}"/>
      <circle cx="98" cy="48" r="3" fill="white"/>
      <ellipse cx="54" cy="67" rx="8" ry="4" fill="rgba(255,150,150,0.38)"/>
      <ellipse cx="106" cy="67" rx="8" ry="4" fill="rgba(255,150,150,0.38)"/>
      <ellipse cx="80" cy="77" rx="8" ry="7" fill="#cc3366"/>
      <ellipse cx="80" cy="76" rx="5.5" ry="5" fill="#ff99bb"/>`;
  }
  return `
    <ellipse cx="65" cy="52" rx="10" ry="12" fill="white"/>
    <ellipse cx="65" cy="54" rx="7" ry="8.5" fill="${ec}"/>
    <circle cx="68.5" cy="50" r="2.5" fill="white"/>
    <ellipse cx="95" cy="52" rx="10" ry="12" fill="white"/>
    <ellipse cx="95" cy="54" rx="7" ry="8.5" fill="${ec}"/>
    <circle cx="98.5" cy="50" r="2.5" fill="white"/>
    <ellipse cx="54" cy="65" rx="8" ry="4" fill="rgba(255,150,150,0.38)"/>

    <path d="M68,72 Q80,81 92,72" stroke="#cc3366" fill="none" stroke-width="2.5" stroke-linecap="round"/>`;
}

function buildCharSVG(charId, outfit, w=140, expression=0) {
  const char = CHARS[charId];
  const skin = char.skin;
  const isMale = char.gender === 'male';
  const h = Math.round(w * 300 / 160);
  const layers = [];

  if (char.wings) layers.push(char.wings);

  // 鞋子
  if (outfit.shoes >= 0) {
    layers.push(CLOTHING.shoes[outfit.shoes].svg);
  } else {
    layers.push(`<ellipse cx="61" cy="284" rx="12" ry="7" fill="${skin}"/>
                 <ellipse cx="99" cy="284" rx="12" ry="7" fill="${skin}"/>`);
  }

  // 腿
  if (isMale) {
    layers.push(`<path d="M52,193 Q47,240 49,282 L70,282 Q72,240 74,193Z" fill="${skin}"/>
                 <path d="M86,193 Q87,240 91,282 L110,282 Q112,240 108,193Z" fill="${skin}"/>`);
  } else {
    layers.push(`<path d="M55,193 Q50,240 52,282 L70,282 Q72,240 73,193Z" fill="${skin}"/>
                 <path d="M87,193 Q88,240 90,282 L108,282 Q110,240 105,193Z" fill="${skin}"/>`);
  }

  // 下装
  if (outfit.dress < 0 && outfit.bottom >= 0) {
    layers.push(CLOTHING.bottom[outfit.bottom].svg);
  }

  // 躯干
  if (isMale) {
    layers.push(`<path d="${P.mBodice}" fill="${skin}"/>`);
  } else {
    layers.push(`<path d="M45,100 Q32,142 35,193 L125,193 Q128,142 115,100 Q100,93 80,91 Q60,93 45,100Z" fill="${skin}"/>`);
  }

  // 上装
  if (outfit.dress < 0 && outfit.top >= 0) {
    layers.push(CLOTHING.top[outfit.top].svg);
  }

  // 连衣裙
  if (outfit.dress >= 0) {
    layers.push(CLOTHING.dress[outfit.dress].svg);
  }

  // 手臂
  if (isMale) {
    layers.push(`<path d="M30,108 Q14,142 16,174 L28,178 Q34,156 40,126 L40,108Z" fill="${skin}"/>
                 <path d="M130,108 Q146,142 144,174 L132,178 Q126,156 120,126 L120,108Z" fill="${skin}"/>`);
  } else {
    layers.push(`<path d="M35,114 Q19,144 21,176 L32,179 Q38,156 44,130 L44,114Z" fill="${skin}"/>
                 <path d="M125,114 Q141,144 139,176 L128,179 Q122,156 116,130 L116,114Z" fill="${skin}"/>`);
  }

  // 包包
  if (outfit.bag >= 0) {
    layers.push(CLOTHING.bag[outfit.bag].svg);
  }

  // 后发（先于脖子/头渲染，使脸部肤色正确覆盖在发色之上）
  layers.push(char.hairBack);

  // 脖子
  if (isMale) {
    layers.push(`<rect x="70" y="88" width="20" height="16" fill="${skin}"/>`);
  } else {
    layers.push(`<rect x="72" y="88" width="16" height="16" fill="${skin}"/>`);
  }

  // 头
  layers.push(`<ellipse cx="80" cy="52" rx="36" ry="38" fill="${skin}"/>`);

  // 表情
  layers.push(getFaceSVG(char.eyeColor, expression));

  // 前发
  layers.push(char.hairFront);

  // 帽子 / 发饰
  if (outfit.hat >= 0) {
    layers.push(CLOTHING.hat[outfit.hat].svg);
  } else if (outfit.hairAcc >= 0) {
    layers.push(CLOTHING.hairAcc[outfit.hairAcc].svg);
  }

  // 小星特效
  if (charId === 2) {
    layers.push(`<circle cx="108" cy="32" r="3" fill="#ffd700" opacity="0.8" style="animation:twinkle 1.5s infinite"/>
                 <circle cx="55" cy="18" r="2" fill="#c39bd3" opacity="0.7" style="animation:twinkle 2s infinite 0.5s"/>`);
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 300" width="${w}" height="${h}" style="display:block">${layers.join('')}</svg>`;
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const id = { title:'s-title', chars:'s-chars', dress:'s-dress', scenes:'s-scenes', play:'s-play' }[screen];
  document.getElementById(id).classList.add('active');
  state.screen = screen;
  if (screen === 'chars')  renderCharSelect();
  if (screen === 'dress')  renderDressingRoom();
  if (screen === 'scenes') renderSceneSelect();
  if (screen === 'play')   renderScenePlay();
}

  const row = document.getElementById('titlePreviews');
  row.innerHTML = CHARS.map((c, i) => `

      ${buildCharSVG(i, state.outfit, 56)}

function renderCharSelect() {
  const row = document.getElementById('charCardRow');
  row.innerHTML = CHARS.map((c, i) => {
    const name = getCharName(i);
    const isMale = c.gender === 'male';
    const nameHtml = editingNameId === i
      ? `<div class="char-name-row">
           <input id="nameInput_${i}" class="char-name-input" value="${name}" maxlength="8"
             onkeydown="if(event.key==='Enter')confirmNameEdit(${i});if(event.key==='Escape')cancelNameEdit()"
             onclick="event.stopPropagation()"/>
           <button class="char-name-confirm" onclick="event.stopPropagation();confirmNameEdit(${i})">✓</button>
           <button class="char-name-cancel" onclick="event.stopPropagation();cancelNameEdit()">✗</button>
         </div>`
      : `<div class="char-name-row">
           <span class="char-card-name">${name}</span>
           ${isMale ? '<span class="gender-badge-m">♂</span>' : ''}
           <button class="char-name-edit-btn" onclick="event.stopPropagation();startNameEdit(${i})">✏️</button>
         </div>`;

    const tagsHtml = `<div class="char-tags">${c.tags.map(t=>`<span class="char-tag-pill">${t}</span>`).join('')}</div>`;

    return `
      <div class="char-card ${state.charId===i?'selected':''}" onclick="pickChar(${i})">

        ${tagsHtml}
        <div class="char-card-story">${c.story}</div>
        <div class="char-card-bday">🎂 ${c.birthday} &nbsp;⭐ ${c.zodiac}</div>
        <button class="btn btn-primary" style="margin-top:6px;font-size:12px;padding:8px 20px"
          onclick="event.stopPropagation();pickChar(${i});goTo('dress')">为我换装 ✨</button>

  }).join('');

function pickChar(id) {
  state.charId = id;
  editingNameId = -1;
  SFX.charSelect();
  renderCharSelect();
  saveOutfit();
}

// ================================================================
// 换装室
// ================================================================
function renderDressingRoom() {
  renderCatTabs();
  renderItemGrid();
  renderCharStage();
  renderOutfitSummary();
  renderExprRow();
  updateFavBtns();
}

function renderCatTabs() {
  document.getElementById('catTabs').innerHTML = CATS.map(c => `
    <div class="cat-tab ${state.activeTab===c.key?'active':''}" onclick="switchTab('${c.key}')">
      ${c.emoji} ${c.label}
    </div>
  `).join('');
}

function switchTab(key) {
  state.activeTab = key;
  renderCatTabs();
  renderItemGrid();
}

function renderItemGrid() {
  const char = CHARS[state.charId];
  const items = CLOTHING[state.activeTab] || [];
  const outfit = state.outfit;
  const curSel = outfit[state.activeTab] !== undefined ? outfit[state.activeTab] : -1;

  const visibleItems = items.map((item, i) => ({ item, i }))
    .filter(({ item }) => !item.gender || item.gender === char.gender);

  document.getElementById('itemGrid').innerHTML = visibleItems.map(({ item, i }) => `
    <div class="item-card ${curSel===i?'selected':''}" onclick="selectClothing('${state.activeTab}',${i})">
      <div class="item-color" style="background:${item.color}20;border:2px solid ${item.color}60">
        <span>${item.emoji}</span>
      </div>
      <span class="item-name">${item.name}</span>
    </div>
  `).join('');
}

function selectClothing(cat, idx) {
  const o = state.outfit;
  if (cat === 'dress') {
    o.dress === idx ? (o.dress=-1) : (o.dress=idx, o.top=-1, o.bottom=-1);
    SFX.dressOn();
  } else if (cat === 'top') {
    o.top === idx ? (o.top=-1, SFX.dressOff()) : (o.top=idx, o.dress=-1, SFX.dressOn());
  } else if (cat === 'bottom') {
    o.bottom === idx ? (o.bottom=-1, SFX.dressOff()) : (o.bottom=idx, o.dress=-1, SFX.dressOn());
  } else if (cat === 'hat') {
    o.hat === idx ? (o.hat=-1, SFX.dressOff()) : (o.hat=idx, o.hairAcc=-1, SFX.accessory());
  } else if (cat === 'hairAcc') {
    o.hairAcc === idx ? (o.hairAcc=-1, SFX.dressOff()) : (o.hairAcc=idx, o.hat=-1, SFX.accessory());
  } else {
    o[cat] === idx ? (o[cat]=-1, SFX.dressOff()) : (o[cat]=idx, SFX.accessory());
  }
  renderCharStage();
  renderItemGrid();
  renderOutfitSummary();
  saveOutfit();
}

function renderCharStage() {
  document.getElementById('dressingStage').innerHTML = buildCharSVG(state.charId, state.outfit, 136, state.expression);
}

function renderOutfitSummary() {
  const o = state.outfit;
  const tags = [];
  const catName = { dress:'裙', top:'上装', bottom:'下装', hat:'帽', hairAcc:'发饰', bag:'包', shoes:'鞋' };
  Object.keys(catName).forEach(k => {
    const idx = o[k];
    if (idx >= 0 && CLOTHING[k] && CLOTHING[k][idx]) {
      tags.push(`<span class="outfit-tag">${CLOTHING[k][idx].name}</span>`);
    }
  });
  document.getElementById('outfitSummary').innerHTML = tags.length ? tags.join('') : '<span style="color:var(--text-dim);font-size:12px">还没穿任何衣服哦～</span>';
}

function renderExprRow() {
  const exprs = [{icon:'😊',val:0},{icon:'😜',val:1},{icon:'😮',val:2}];
  document.getElementById('exprRow').innerHTML = exprs.map(e =>
    `<button class="expr-btn ${state.expression===e.val?'active':''}" onclick="setExpression(${e.val})" title="${['开心','调皮','惊喜'][e.val]}">${e.icon}</button>`
  ).join('');
}

function setExpression(val) {
  state.expression = val;
  renderExprRow();
  renderCharStage();
  saveOutfit();
}

function clearOutfit() {
  state.outfit = { dress:-1, top:-1, bottom:-1, hat:-1, hairAcc:-1, bag:-1, shoes:-1 };
  SFX.dressOff();
  renderDressingRoom();
  saveOutfit();
}

function renderSceneSelect() {
  document.getElementById('sceneCardGrid').innerHTML = SCENES.map(s => `

function pickScene(id) {

function renderScenePlay() {
  const scene = SCENES[state.sceneId];
  const stage = document.getElementById('sceneStage');
  stage.style.background = scene.stageBg;
  const floorEl = stage.querySelector('.scene-floor') || (() => {
    const d = document.createElement('div');
    d.className = 'scene-floor';
    d.style.cssText = `position:absolute;bottom:0;left:0;right:0;height:18%;z-index:1`;
    stage.insertBefore(d, stage.firstChild);
    return d;
  })();
  floorEl.style.background = scene.floor;
  document.getElementById('sceneDeco').innerHTML = scene.deco;
  const charEl = document.getElementById('scene-char');
  charEl.innerHTML = buildCharSVG(state.charId, state.outfit, 118, state.expression);
  charEl.className = '';
  charEl.style.zIndex = '10';
}

const ANIMS = ['wave', 'jump', 'spin'];
function onCharClick() {
  const type = ANIMS[state.animIndex % 3];
  state.animIndex++;
  triggerAnim(type);
}
function triggerAnim(type) {
  SFX.bounce();
  const el = document.getElementById('scene-char');
  el.classList.remove('anim-wave', 'anim-jump', 'anim-spin');
  void el.offsetWidth;
  el.classList.add(`anim-${type}`);
  clearTimeout(state.animTimer);
  state.animTimer = setTimeout(() => {
    if (el) el.classList.remove('anim-wave', 'anim-jump', 'anim-spin');
  }, 1200);
}
function decoClick(el, effect) {
  SFX.sparkle();
  el.style.transform = 'scale(1.25)';
  el.style.filter = 'brightness(1.4) drop-shadow(0 0 12px rgba(255,220,0,0.8))';
  setTimeout(() => { el.style.transform = ''; el.style.filter = ''; }, 600);
}

// ================================================================
// 静音
// ================================================================
const btnMute = document.getElementById('btnMute');
let muted; try{ muted = JSON.parse(localStorage.getItem('小游戏_全局_静音') || 'false'); }catch{ muted = false; }
btnMute.textContent = muted ? '🔇' : '🔊';
btnMute.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('小游戏_全局_静音', JSON.stringify(muted));
  btnMute.textContent = muted ? '🔇' : '🔊';
});

// ================================================================
// 初始化
// ================================================================
loadOutfit();
renderTitlePreviews();
</script>
</body>
