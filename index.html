<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佳琪的小游戏合集</title>
  <style>
    :root {
      --bg-primary:     #1a1a2e;
      --bg-secondary:   #16213e;
      --bg-tertiary:    #0f3460;
      --bg-panel:       rgba(255,255,255,0.05);
      --bg-panel-hover: rgba(255,255,255,0.09);
      --text-primary:   #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted:     #555566;
      --border-subtle:  rgba(255,255,255,0.10);
      --accent:         #7c6af7;
      --accent-dim:     #6355d4;
      --glow-accent:    0 0 20px rgba(124,106,247,0.4);
      --font-ui:        'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      --font-mono:      'Consolas', 'Courier New', monospace;
      --radius-md:      10px;
      --radius-lg:      16px;
      --radius-xl:      22px;
      --transition:     0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text-primary);
      user-select: none;
      overflow-x: hidden;
    }

    /* 星空粒子画布 */
    #starCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* 主内容层 */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 24px 40px;
    }

    /* 顶部导航栏 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 36px;
    }
    .header-left h1 {
      font-size: 1.9rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #a78bfa, #7c6af7, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-left p { color: var(--text-muted); font-size: 0.82rem; margin-top: 4px; }
    .header-right { display: flex; gap: 10px; align-items: center; }

    .icon-btn {
      width: 40px; height: 40px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: var(--bg-panel);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-panel-hover); }

    /* 搜索框 */
    .search-wrap {
      position: relative;
      margin-bottom: 32px;
      max-width: 380px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 25px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      outline: none;
      transition: all var(--transition);
    }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,106,247,0.2); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }

    /* 区块标题 */
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    /* 游戏卡片网格 */
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 48px;
    }

    /* 单张卡片 */
    .game-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 0;
      width: 220px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .game-card:hover {
      border-color: var(--card-accent, var(--accent));
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(var(--card-glow-rgb, 124,106,247), 0.22);
      background: var(--bg-panel-hover);
    }

    /* 卡片顶部色条 */
    .card-top-bar {
      height: 4px;
      background: var(--card-accent, var(--accent));
      opacity: 0.85;
    }

    .card-body {
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .card-emoji { font-size: 2.8rem; line-height: 1; }

    .card-tag {
      font-size: 0.67rem;
      color: var(--card-accent, var(--accent));
      border: 1px solid var(--card-accent, var(--accent));
      padding: 2px 9px;
      border-radius: 12px;
      opacity: 0.8;
      white-space: nowrap;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--card-accent, var(--accent));
      letter-spacing: 1px;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    /* 统计栏 */
    .card-stats {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
      padding: 10px 0;
      margin: 6px 0;
    }
    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat + .stat { border-left: 1px solid var(--border-subtle); }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }

    /* 开始按钮 */
    .card-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--card-accent, var(--accent));
      color: #1a1a2e;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 0 0 calc(var(--radius-xl) - 1px) calc(var(--radius-xl) - 1px);
      transition: opacity var(--transition);
    }
    .card-btn:hover { opacity: 0.85; }

    /* 空状态 */
    .empty-state {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 40px 0;
      text-align: center;
    }

    /* 页脚 */
    footer {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-wrap: wrap;
      gap: 8px;
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>

<!-- 星空粒子 -->
<canvas id="starCanvas"></canvas>

<div class="page">
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-left">
      <h1>✨ 佳琪小游戏合集</h1>
      <p id="gameCount">正在加载...</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnMute" title="静音切换">🔊</button>
    </div>
  </header>

  <!-- 搜索 -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索游戏名称或类型…" autocomplete="off">
  </div>

  <!-- 全部游戏 -->
  <div class="section-title" id="allTitle">全部游戏</div>
  <div class="game-grid" id="gameGrid"></div>

  <!-- 页脚 -->
  <footer>
    <span>小游戏合集 v1.1.0 · 2026-03-25</span>
    <span>双击 HTML 文件即可在浏览器中运行</span>
  </footer>
</div>

<script>
// ==============================================================
// 游戏配置列表 — 新增游戏只需在此追加一个对象
// ==============================================================
const GAMES = [
  {
    id:         '贪吃蛇',
    title:      '贪吃蛇',
    emoji:      '🐍',
    desc:       '控制蛇的方向，吃食物变长，不能撞墙或咬自尾',
    tag:        '经典',
    accent:     '#00ff88',
    glowRgb:    '0,255,136',
    path:       '贪吃蛇/index.html',
    bestKey:    '小游戏_贪吃蛇_最高分',
    bestLabel:  '最高分',
    bestUnit:   '分',
    countKey:   '小游戏_贪吃蛇_总局数',
  },
  {
    id:         '俄罗斯方块',
    title:      '俄罗斯方块',
    emoji:      '🧱',
    desc:       '旋转方块消行，坚持到堆顶为止，越来越快',
    tag:        '经典',
    accent:     '#e94560',
    glowRgb:    '233,69,96',
    path:       '俄罗斯方块/index.html',
    bestKey:    '小游戏_俄罗斯方块_最高分',
    bestLabel:  '最高分',
    bestUnit:   '分',
    countKey:   '小游戏_俄罗斯方块_总局数',
  },
  {
    id:         '踩雷',
    title:      '踩雷',
    emoji:      '💣',
    desc:       '推理翻开格子，标记地雷，找出所有安全区域',
    tag:        '解谜',
    accent:     '#ffd54f',
    glowRgb:    '255,213,79',
    path:       '踩雷/index.html',
    bestKey:    '小游戏_踩雷_最快时间_简单',
    bestLabel:  '最快(简单)',
    bestUnit:   '秒',
    lowerIsBetter: true,
    countKey:   '小游戏_踩雷_总局数',
  },
  {
    id:        '换装游戏',
    title:     '换装小屋',
    emoji:     '👗',
    desc:      '为小米、艾拉或小星搭配造型，探索8个梦幻场景',
    tag:       '创意',
    accent:    '#ff85c2',
    glowRgb:   '255,133,194',
    path:      '换装游戏/index.html',
    bestKey:   null,
    bestLabel: '换装次数',
    bestUnit:  '次',
    countKey:  '小游戏_换装_总局数',
  },
  {
    id:         '五子棋',
    title:      '五子棋',
    emoji:      '⚫',
    desc:       '挑战3关AI，4种难度模式，策略对弈',
    tag:        '策略',
    accent:     '#4fc3f7',
    glowRgb:    '79,195,247',
    path:       '五子棋/index.html',
    bestKey:    '小游戏_五子棋_最高通关',
    bestLabel:  '最高通关',
    bestUnit:   '',
    countKey:   '小游戏_五子棋_总局数',
  },
];

// ==============================================================
// 静音系统
// ==============================================================
let globalMuted = JSON.parse(localStorage.getItem('小游戏_全局_静音') || 'false');
const btnMute = document.getElementById('btnMute');
btnMute.textContent = globalMuted ? '🔇' : '🔊';
btnMute.addEventListener('click', () => {
  globalMuted = !globalMuted;
  localStorage.setItem('小游戏_全局_静音', JSON.stringify(globalMuted));
  btnMute.textContent = globalMuted ? '🔇' : '🔊';
});

// ==============================================================
// 卡片渲染
// ==============================================================
function getBestDisplay(game) {
  if (game.bestKey === null) {
    const n = localStorage.getItem(game.countKey);
    return n ? `${JSON.parse(n)} ${game.bestUnit}` : `0 ${game.bestUnit}`;
  }
  const raw = localStorage.getItem(game.bestKey);
  if (raw === null) return '—';
  const n = JSON.parse(raw);
  if (game.lowerIsBetter && (n === Infinity || n > 9999)) return '—';
  return `${n} ${game.bestUnit}`;
}

function getCountDisplay(game) {
  const n = localStorage.getItem(game.countKey);
  return n ? `${n} 次` : '0 次';
}

function renderCards(list) {
  const grid = document.getElementById('gameGrid');
  const titleEl = document.getElementById('allTitle');

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state">没有找到匹配的游戏</div>';
    titleEl.textContent = '全部游戏';
    return;
  }

  titleEl.textContent = `全部游戏`;
  grid.innerHTML = '';

  list.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.setProperty('--card-accent',   game.accent);
    card.style.setProperty('--card-glow-rgb', game.glowRgb);

    card.innerHTML = `
      <div class="card-top-bar"></div>
      <div class="card-body">
        <div class="card-row1">
          <div class="card-emoji">${game.emoji}</div>
          <span class="card-tag">${game.tag}</span>
        </div>
        <div class="card-title">${game.title}</div>
        <div class="card-desc">${game.desc}</div>
        <div class="card-stats">
          <div class="stat">
            <span class="stat-label">${game.bestLabel}</span>
            <span class="stat-value">${getBestDisplay(game)}</span>
          </div>
          <div class="stat">
            <span class="stat-label">已玩</span>
            <span class="stat-value">${getCountDisplay(game)}</span>
          </div>
        </div>
      </div>
      <a class="card-btn" href="${game.path}">▶ 开始游戏</a>
    `;

    // 点击卡片主体也跳转（排除按钮本身的重复跳转）
    card.addEventListener('click', e => {
      if (!e.target.classList.contains('card-btn')) {
        window.location.href = game.path;
      }
    });

    grid.appendChild(card);
  });
}

// 更新游戏计数
function updateCount(list) {
  document.getElementById('gameCount').textContent = `共 ${list.length} 款精品小游戏`;
}

// 搜索/筛选
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  const filtered = q
    ? GAMES.filter(g => g.title.includes(q) || g.tag.includes(q) || g.desc.includes(q))
    : GAMES;
  renderCards(filtered);
});

// 初始渲染
renderCards(GAMES);
updateCount(GAMES);

// ==============================================================
// 星空粒子动画
// ==============================================================
(function initStars() {
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');

  let W = 0, H = 0;
  const STAR_COUNT = 160;
  const stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomStar() {
    return {
      x:       Math.random() * W,
      y:       Math.random() * H,
      r:       Math.random() * 1.4 + 0.3,
      alpha:   Math.random() * 0.6 + 0.15,
      speed:   Math.random() * 0.015 + 0.005,
      phase:   Math.random() * Math.PI * 2,
      drift:   (Math.random() - 0.5) * 0.08,  // 水平漂移速度
    };
  }

  function init() {
    stars.length = 0;
    for (let i = 0; i < STAR_COUNT; i++) stars.push(randomStar());
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    stars.forEach(s => {
      // 闪烁
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${a})`;
      ctx.fill();

      // 缓慢漂移
      s.x += s.drift;
      if (s.x < -2) s.x = W + 2;
      if (s.x > W + 2) s.x = -2;
    });

    requestAnimationFrame(draw);
  }

  resize();
  init();
  draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
</body>
</html>
